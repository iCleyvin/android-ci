name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: self-hosted

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "ANDROID_HOME=/home/cleyvinserv/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/home/cleyvinserv/android-sdk" >> $GITHUB_ENV
          echo "/home/cleyvinserv/.nvm/versions/node/v20.20.1/bin" >> $GITHUB_PATH
          echo "/home/cleyvinserv/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "/home/cleyvinserv/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: Install Node dependencies
        run: npm install

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK debug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-infinite-debug-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
